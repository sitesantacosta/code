<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SANTACOSTA | trabalhos</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:ital,wght@0,100..800;1,100..800&display=swap" rel="stylesheet">
    <style>
        :root {
            --verde-vivo: #e2ff8f;
            --verde-escuro: #505a50;
            --verde-medio: #697369;
            --fundo-claro: #f5f7f6;
            --fundo-medio: #e5eae7;
            --verde-escuro-fundo: #202420;
            --gap: 4px;
            --scroll-ratio: 0; /* Controlado via JS para o shrink fluido */
        }

        * { margin: 0; padding: 0; box-sizing: border-box; border-radius: 0 !important; }

body {
    font-family: 'JetBrains Mono', monospace;
    background-color: var(--verde-escuro-fundo); /* Cor das margens laterais */
    display: flex;
    justify-content: center;
    -webkit-tap-highlight-color: transparent;
}

#site-wrapper {
    width: 100%;
    max-width: 1400px;
    background-color: var(--fundo-claro); /* Fundo real do conteúdo */
    min-height: 100vh;
    position: relative;
    
}

        /* --- HEADER DINÂMICO --- */
/* No seletor header */
header { 
    position: sticky; 
    top: 0; 
    z-index: 1000; 
    background: var(--verde-vivo);
    border-bottom: 1px solid var(--verde-escuro-fundo);
    /* REMOVA a linha transition: height 0.2s ease; */
}

/* No seletor .header-top */
.header-top { 
    display: flex; 
    align-items: center; 
    padding: 0 4vw;
    /* Altura reduz de 100px para 60px (40% de redução) */
    height: calc(100px - (var(--scroll-ratio) * 40px));
    /* REMOVA a linha transition: height 0.2s ease; */
}

/* No seletor .logo */
.logo { 
    font-weight: 800; 
    cursor: pointer; 
    letter-spacing: -2px;
    /* Fonte reduz de 4rem para 2.4rem (40% de redução) */
    font-size: calc(4rem - (var(--scroll-ratio) * 1.6rem));
    margin-right: 40px;
    line-height: 1;
    /* REMOVA qualquer transição de font-size aqui */
}

        /* Menu Desktop */
/* No seletor .desktop-nav */
.desktop-nav {
    display: flex;
    gap: 25px;
    align-items: center;
    margin-left: auto; /* Alinha o menu à direita */
    margin-right: 0;   /* Garante que encoste no padding de 4vw do pai */
}

/* Adicione esta nova regra para o efeito de mouseover */
.desktop-nav a {
    text-decoration: none;
    color: var(--verde-escuro-fundo);
    font-size: clamp(0.9rem, 1.5vw, 1.1rem);
    font-weight: 500;
    text-transform: uppercase;    
    transition: border-color 0.1s ease;
    border-bottom: 1px solid transparent; /* Reserva o espaço para não pular no hover */
}

.desktop-nav a:hover {
    text-decoration: underline;
    text-decoration-color: var(--fundo-claro);
    text-underline-offset: 0px; /* Dá o "ritmo editorial" e evita o choque com a fonte */
    text-decoration-thickness: 10px; /* Define a força da linha */
}



        .mobile-menu-trigger { display: none; margin-left: auto; cursor: pointer; }
/* --- AJUSTE DE ÍCONES E SETA --- */
.icon-svg { 
    width: 18px; 
    height: 18px; 
    fill: var(--verde-escuro-fundo); 
    transition: transform 0.3s ease; /* Para a rotação suave */
}

/* Seta 30% menor (aprox. 12px) */
.icon-seta { 
    width: 12px; 
    height: 12px; 
}

/* --- NAV BAR E DROPDOWN --- */

.nav-bar { 
            display: grid;
            grid-template-columns: 1fr 1fr; /* Mudamos de 1fr 60px 1fr para 1fr 1fr */
            background: var(--fundo-claro); 
            height: 48px; 
            border-top: 1px solid var(--verde-escuro-fundo);
        }

        .nav-item { 
            display: flex; align-items: center; justify-content: center; 
            border-right: 1px solid var(--verde-escuro); 
            font-size: 0.9rem; text-transform: uppercase;
            cursor: pointer;
        }

        .nav-item:last-child { border-right: none; }
        .nav-item:hover { background: var(--verde-vivo); }

        .dropdown-content {
            position: absolute;
            top: 100%;
            background: var(--fundo-medio);
            z-index: 1001;
            display: none;
            border: 1px solid var(--verde-escuro);
            border-top: none; 
        }

        .dropdown-item {
            padding: 12px 20px;
            border-bottom: 1px solid var(--verde-escuro);
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            font-size: 0.9rem;
        }

.dropdown-item:first-child {
    border-top: 1px solid var(--verde-escuro-fundo); /* Limpeza na base do menu [cite: 889] */
}

.dropdown-item:last-child {
    border-bottom: 0px solid var(--verde-escuro-fundo); /* Limpeza na base do menu [cite: 889] */
}
        .dropdown-item:hover { background-color: var(--verde-vivo); }

        /* Ajuste das larguras dos dropdowns para 50% */
        #drop-cat { 
            left: -1px; 
            width: calc(50% + 1px); 
            
        }
        
        #drop-filtro { 
            left: calc(50% - 1px); 
            width: calc(50% + 1px); 
        }

/* Centraliza APENAS as palavras do menu TODOS/PINTURA/OBJETO */
#drop-cat .dropdown-item {
justify-content: center;
    
}

/* Mantém GRID e LISTA alinhados à esquerda (junto ao ícone) */
#drop-filtro .dropdown-item {
    justify-content: flex-start;
    padding-left: 21px; /* Alinhamento sênior com o ícone de cima */
}

        /* --- GRID --- */
        #main-container { padding: 0px 38px; background: var(--fundo-medio); }
        .grid-layout { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px;   }
        .obra-miniatura { aspect-ratio: 3/4; background: transparent; display: flex; align-items: center; justify-content: center; cursor: pointer; margin: 4px; overflow: hidden; }
        .obra-miniatura img { width: 100%; height: 100%; object-fit: contain; }
        .obra-miniatura.ativo { filter: grayscale(100%); }

        /* --- ACORDEÃO (CARROSSEL) --- */
        .acordeao-container { grid-column: 1 / -1; background: var(--fundo-claro); margin-bottom: 4px; margin-top: 4px; padding-top: 4px; padding-bottom: 4px; border-bottom: 1px solid var(--verde-vivo); border-top: 1px solid var(--verde-vivo); }
        .carousel-view { display: flex; overflow-x: auto; scroll-snap-type: x mandatory; scrollbar-width: none; height: 60vh; scroll-behavior: smooth; }
        .carousel-view::-webkit-scrollbar { display: none; }
        .carousel-view img { flex: 0 0 100%; width: 100%; height: 100%; object-fit: contain; scroll-snap-align: center; padding: 20px; }

        .indicadores { display: flex; justify-content: center; gap: 4px; margin: 20px 0; }
        .ponto { width: 45px; height: 12px; border: 1px solid var(--verde-escuro); background: var(--fundo-medio); cursor: pointer; }
        .ponto.ativo { background: var(--verde-vivo); }

        .ficha-tecnica { text-align: center; padding: 0 50px; font-size: 0.69rem; line-height: 1.3; position: relative; margin-bottom: 18px;}
        .ficha-tecnica strong { display: block; margin-bottom: 4px; }
        .ficha-tecnica i { display: block; color: var(--verde-medio); font-style: italic; margin-bottom: 4px; }

        /* --- MODO LISTA --- */
        .lista-layout { display: flex; flex-direction: column; gap: 50px; padding-top: 20px; }
        /* --- MENU FULL (MOBILE) --- */
        #menu-full { 
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; 
            background: var(--verde-vivo); z-index: 2000; display: none; 
            flex-direction: column; justify-content: center; align-items: center; gap: 30px;
        }

        #menu-full a { 
            text-decoration: none; color: var(--verde-escuro-fundo); 
            font-size: 1.5rem; font-weight: 800;
        }
    
/* --- LIGHTBOX ATUALIZADO --- */
        #lightbox {
            position: fixed;
            top: 0; 
            left: 0; 
            width: 100vw; 
            height: 100vh;
            /* Cor #202420 com 88% de opacidade (e0 em hex) */
            background-color: rgba(32, 36, 32, 0.94); 
            z-index: 3000;
            display: none;
            flex-direction: column;
        }

        #lightbox-content {
            display: flex;
            overflow-x: auto;
            scroll-snap-type: x mandatory;
            scrollbar-width: none;
            height: 100%;
            align-items: center; /* Centraliza a imagem verticalmente */
            gap: 12px;
        }

        #lightbox-content::-webkit-scrollbar { display: none; }

        #lightbox-content img {
            flex: 0 0 100vw; /* Cada slide ocupa a largura da tela para o scroll */
            width: 94%;      /* Limita a largura da imagem */
            height: 94%;     /* Limita a altura da imagem */
            max-width: 94vw; 
            max-height: 94vh;
            object-fit: contain;
            scroll-snap-align: center;
            margin: 0 auto;  /* Centraliza a imagem horizontalmente dentro do slide */
            
        }

        .close-lb {
            position: absolute;
            top:18px; 
            right:60px;
            font-size: 1.3rem; /* Tamanho solicitado */
            color: var(--verde-vivo); /* Cor verde vivo #e2ff8f */
            cursor: pointer;
            z-index: 3001;
            font-weight: 500;
        }
        
        
                /* --- MENU FULL (MOBILE) --- */
        #menu-full { 
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; 
            background: var(--verde-vivo); z-index: 2000; display: none; 
            flex-direction: column; justify-content: center; align-items: center; gap: 30px;
        }

        #menu-full a { 
            text-decoration: none; color: var(--verde-escuro-fundo); 
            font-size: 1.5rem; font-weight: 800;
        }

        /* --- RESPONSIVIDADE --- */
        @media (max-width: 900px) {
            .desktop-nav { display: none; }
            .mobile-menu-trigger { display: block; }
            .header-top { height: 70px !important; } /* Altura fixa mais discreta no mobile */
            .logo { font-size: 2rem !important; margin-right: 0; }
            .nav-bar { grid-template-columns: 1fr 1fr; }
            .nav-item:nth-child(3) { display: none; }
            .grid-layout { grid-template-columns: repeat(2, 1fr);  }
            .contact-wrapper { flex-direction: column; align-items: center; text-align: center; }
            .contact-links { align-items: center; }
            #main-container { padding: 0px 8px; }
            .grid-layout { gap: 8px; } 
            #drop-cat {width: calc(50% + 1px);}
            #drop-filtro {left: calc(50% - 1px); width: calc(50% + 1px);}
}
    
    </style>
</head>
<body>
<div id="site-wrapper">
    <header id="dynamic-header">
        <div class="header-top">
            <div class="logo" onclick="location.href='https://betshoptv.com/temp/santa-home'">SANTACOSTA</div>
            <nav class="desktop-nav">
                <a style="font-weight: 400; cursor: default; color: var(--verde-medio)">TRABALHOS</a>
                <a href="expos.html">EXPOSIÇÕES</a>
                <a href="textos.html">TEXTOS</a>
                <a href="noticias.html">NOTÍCIAS</a>
                <a href="bio.html">BIO</a>
            </nav>
            
            <div class="mobile-menu-trigger" onclick="toggleMenu(true)">
                <svg class="icon-svg" viewBox="0 0 24 24"><path d="M3 18h18v-2H3v2zm0-5h18v-2H3v2zm0-7v2h18V6H3z"/></svg>

    <div class="nav-bar">

        </div>
        <div id="drop-cat" class="dropdown-content"></div>
        <div id="drop-filtro" class="dropdown-content">
            <div class="dropdown-item" onclick="setModo('GRID')" style="justify-content: center;">
                <svg class="icon-svg" viewBox="0 0 32 32"><rect x="2" y="2" width="7" height="7"/><rect x="12" y="2" width="7" height="7"/><rect x="22" y="2" width="7" height="7"/><rect x="2" y="12" width="7" height="7"/><rect x="12" y="12" width="7" height="7"/><rect x="22" y="12" width="7" height="7"/><rect x="2" y="22" width="7" height="7"/><rect x="12" y="22" width="7" height="7"/><rect x="22" y="22" width="7" height="7"/>
                </svg> GRID
            </div>
            <div class="dropdown-item" onclick="setModo('LISTA')" style="justify-content: center;">
                <svg class="icon-svg" viewBox="0 0 512 512"><g transform="translate(64,64)"><path d="M106.6,0 L384,0 L384,42.6 L106.6,42.6 L106.6,0 Z M0,0 L64,0 L64,42.6 L0,42.6 L0,0 Z M106.6,106.6 L384,106.6 L384,149.3 L106.6,149.3 L106.6,106.6 Z M0,106.6 L64,106.6 L64,149.3 L0,149.3 L0,106.6 Z M106.6,213.3 L384,213.3 L384,256 L106.6,256 L106.6,213.3 Z M0,213.3 L64,213.3 L64,256 L0,256 L0,213.3 Z M106.6,320 L384,320 L384,362.6 L106.6,362.6 L106.6,320 Z M0,320 L64,320 L64,362.6 L0,362.6 L0,320 Z"/></g>

<div id="lightbox" onclick="closeLightbox()">

    </div>
</header>

    <div id="menu-full">
        <div onclick="toggleMenu(false)" style="position:absolute; top:20px; right:8vw; font-size:2.4rem; font-weight: 800; cursor:pointer;">✕</div>
        <a href="trabalhos.html" style="font-size:2.4rem; font-weight: 800;">TRABALHOS</a>
        <a href="expos.html" style="font-size:2.4rem; font-weight: 800;">EXPOSIÇÕES</a>
        <a href="textos.html" style="font-size:2.4rem; font-weight: 800;">TEXTOS</a>
        <a href="noticias.html" style="font-size:2.4rem; font-weight: 800;">NOTÍCIAS</a>
        <a href="bio.html" style="font-size:2.4rem; font-weight: 800;">BIO</a>

<script>
    let rawObras = [];
    let manifesto = {};
    let modoVis = 'GRID';
    let catAtiva = 'TODOS';
    let tituloAberto = null;
    const categoriasList = ["PINTURA", "OBJETO", "ESCULTURA", "COLAGEM", "VÍDEO"];

    async function init() {
        try {
            // Chamada paralela para os dois JSONs
            const [resObras, resManifesto] = await Promise.all([
                fetch('https://sitesantacosta.github.io/code/data/trabalhos.json?v=' + Date.now()),
                fetch('https://sitesantacosta.github.io/img/manifesto.json?v=' + Date.now())
            ]);
            
            rawObras = await resObras.json();
            manifesto = await resManifesto.json();

            render(processarDados());
            renderDropdownCat();
        } catch (e) {
            console.error("Erro no carregamento:", e);
        }
    }

function processarDados() {
        const baseThumb = "https://sitesantacosta.github.io/img/thumb/trabalhos/";
        const baseFull = "https://sitesantacosta.github.io/img/full/trabalhos/";
        const baseZoom = "https://sitesantacosta.github.io/img/zoom/trabalhos/";

        const final = rawObras.map(item => {
            const arquivos = manifesto.trabalhos[item.PASTA] || [];
            
            return {
                ...item,
                fotosThumb: arquivos.map(arq => `${baseThumb}${item.PASTA}/${arq}`),
                fotosFull: arquivos.map(arq => `${baseFull}${item.PASTA}/${arq}`),
                fotosZoom: arquivos.map(arq => `${baseZoom}${item.PASTA}/${arq}`)
            };
        }).sort((a,b) => (parseInt(b.ANO) || 0) - (parseInt(a.ANO) || 0));

        return catAtiva === 'TODOS' ? final : final.filter(o => o.CATEGORIA === catAtiva);
    }
    
    function render(lista) {
        const container = document.getElementById('main-container');
        container.innerHTML = '';
        container.className = modoVis === 'GRID' ? 'grid-layout' : 'lista-layout';

const idxAberto = lista.findIndex(o => o.TITULO === tituloAberto);

// 1. Detecta a quantidade de colunas (espelhando o seu @media de 900px)
const colunas = window.innerWidth <= 900 ? 2 : 3;

// 2. Calcula o final da linha dinamicamente com base nas colunas
const fimLinha = idxAberto !== -1 
    ? Math.min(Math.floor(idxAberto / colunas) * colunas + (colunas - 1), lista.length - 1) 
    : -1;

        lista.forEach((obra, i) => {
            if (modoVis === 'GRID') {
                const min = document.createElement('div');
                min.className = `obra-miniatura ${tituloAberto === obra.TITULO ? 'ativo' : ''}`;
                // Pega sempre a primeira foto do array de thumbs
                const capa = obra.fotosThumb[0] || '';
                min.innerHTML = capa ? `<img src="${capa}" alt="${obra.TITULO}">` : '';
                min.onclick = () => toggleObra(obra, lista);
                container.appendChild(min);
                
                if (i === fimLinha && tituloAberto) {
                    container.appendChild(renderDetalhe(lista[idxAberto], idxAberto));
                }
            } else {
                container.appendChild(renderDetalhe(obra, i, false));
            }
        });
    }

function renderDetalhe(obra, idx, isGrid = true) {
        const div = document.createElement('div');
        div.className = 'acordeao-container';
        const carouselId = `carousel-${idx}`;
        
        div.innerHTML = `
            <div class="carousel-view" id="${carouselId}" onscroll="syncDots('${carouselId}')">
                ${obra.fotosFull.map((f, i) => `
                    <img src="${f}" onclick="openLightbox(${idx}, ${i})" style="cursor: zoom-in;">
                `).join('')}
            </div>
            ${obra.fotosFull.length > 1 ? `<div class="indicadores" id="dots-${carouselId}">
                ${obra.fotosFull.map((_, i) => `
                    <div class="ponto ${i===0?'ativo':''}" onclick="scrollCarousel('${carouselId}', ${i})"></div>
                `).join('')}
            </div>` : ''}
            <div class="ficha-tecnica">
                <strong>${obra.TITULO}, ${obra.ANO}</strong>
                <span>${obra.TECNICA_PT || ''}</span>
                <i>${obra.TECNICA_EN || ''}</i>
                <span>${obra.DIMENSOES || ''}</span>
            </div>
        `;
        return div;
    }

function openLightbox(obraIdx, fotoIdx) {
        const listaAtual = processarDados();
        const obra = listaAtual[obraIdx];
        const content = document.getElementById('lightbox-content');
        
        // Carrega as imagens em ZOOM (Máxima Resolução)
        content.innerHTML = obra.fotosZoom.map(f => `<img src="${f}" onclick="event.stopPropagation()">`).join('');
        document.getElementById('lightbox').style.display = 'flex';

        setTimeout(() => {
            content.scrollTo({ left: content.offsetWidth * fotoIdx, behavior: 'instant' });
        }, 10);
    }

    function closeLightbox() { document.getElementById('lightbox').style.display = 'none'; }

    function toggleObra(obra, lista) {
        tituloAberto = tituloAberto === obra.TITULO ? null : obra.TITULO;
        render(lista);
        if (tituloAberto) {
            setTimeout(() => {
                const acordeao = document.querySelector('.acordeao-container');
                if(acordeao) window.scrollTo({ top: acordeao.offsetTop - 140, behavior: 'smooth' });
            }, 140);
        }
    }

    function scrollCarousel(id, idx) {
        const el = document.getElementById(id);
        if (el) el.scrollTo({ left: el.offsetWidth * idx, behavior: 'smooth' });
    }
 
    function syncDots(id) {
        const el = document.getElementById(id); 
        const dots = document.getElementById(`dots-${id}`);
        if (!dots) return;
        const current = Math.round(el.scrollLeft / el.offsetWidth);
        Array.from(dots.children).forEach((d, i) => d.classList.toggle('ativo', i === current));
    }

    function toggleDropdown(id) {
        const el = document.getElementById(id);
        const visible = el.style.display === 'block';
        document.querySelectorAll('.dropdown-content').forEach(d => d.style.display = 'none');
        el.style.display = visible ? 'none' : 'block';
    }

    function setModo(m) { modoVis = m; render(processarDados()); toggleDropdown('drop-filtro'); }
    
    function setCat(c) { 
        catAtiva = c; 
        document.getElementById('cat-label').innerText = c; 
        render(processarDados());
        renderDropdownCat();
        toggleDropdown('drop-cat');
    }

    function renderDropdownCat() {
        const d = document.getElementById('drop-cat');
        const lista = catAtiva === 'TODOS' ? categoriasList : [...categoriasList.filter(c => c !== catAtiva), 'TODOS'];
        d.innerHTML = lista.map(c => `<div class="dropdown-item" onclick="setCat('${c}')">${c}</div>`).join('');
    }

    function toggleMenu(open) { document.getElementById('menu-full').style.display = open ? 'flex' : 'none'; }

    window.onscroll = () => {
        const ratio = Math.min(window.scrollY / 380, 1);
        document.documentElement.style.setProperty('--scroll-ratio', ratio);
    };
    
    window.addEventListener('keydown', (e) => {
        // Verifica se a tecla é o ESC e se o lightbox está visível na tela
        if (e.key === 'Escape' && document.getElementById('lightbox').style.display === 'flex') {
            closeLightbox();
        }
    });

    init();
